name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest httpx fastapi sqlmodel redis arq num2words jinja2 pyppeteer pandas openpyxl
        
    - name: Run tests
      env:
        REDIS_URL: redis://localhost:6379/0
        DATABASE_URL: sqlite:///./test.db
        SECRET_KEY: test_secret_not_for_prod
      run: |
        python -m pytest tests/test_api_endpoints.py
